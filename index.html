<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XO Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-box">
        <h1>XO GAME</h1>
        
        <div class="board">
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
        </div>

        <div class="button-container">
            <button id="resetGame">🔄 لعبة جديدة</button>
            <button id="resetScores">🔄 تصفير العدّاد</button>
        </div>

        <div class="score-board">
            <div class="score-item player-score">👤 أنت: <span id="playerWins">0</span></div>
            <div class="score-item computer-score">💻 كمبيوتر: <span id="computerWins">0</span></div>
            <div class="score-item draw-score">🤝 تعادل: <span id="draws">0</span></div>
        </div>

        <div class="result"></div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
