<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Can You Afford Forever?</title>
    <link rel="stylesheet" href="calculate.css">
    </head>
<body> 
    <div class="container"> 
<h1 class="main-title" id="mainTitle"> Check Your Wallet Before Your Heart! </h1>
<div class="calculator-box" id="calculatorBox">
<h2>  Gold  Information : </h2>
<div class="input-group">
<input type="number" id="goldPrice" placeholder="Gold Price Per Gram (SYP)"> </div>
<div class="input-group">
<input type="number" id="grams" placeholder="Number of Grams"> </div>
<div class="input-group">
<select id="city">
    <option value="" disabled selected>Please Select a City</option>
    <option value="1">Hama</option>
    <option value="1.05">Damascus</option>
    <option value="1.03">Aleppo</option>
    <option value="0.98">Homs</option>
    <option value="1.02">Latakia</option>
</select> 
</div>
<h2>  Mahr Details :</h2>
<div class="input-group">
<input type="number" id="advance" placeholder="Advance Payment (SYP)"> </div>
<div class="input-group">
<input type="number" id="delayed" placeholder="Delayed Payment (SYP)"> </div>
<h2> Dollar Exchange :</h2>
<div class="input-group">
<input type="number" id="dollarRate" placeholder="USD to SYP Rate"> </div>
<button id="calculateBtn">Calculate</button>
<div id="errorMessage" class="errorMessage"></div>
</div> <!--calculator-box-->
<div id="result" class="result-box"></div>

</div> <!--container-->
<script src="calculate.js"></script>
</body>
</html>
